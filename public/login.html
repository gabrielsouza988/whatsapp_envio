<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Envio — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #075E54;
      letter-spacing: -0.5px;
    }

    .logo h1 span { color: #25D366; }

    .logo p {
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 0.25rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      color: #111827;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #25D366;
      box-shadow: 0 0 0 3px rgba(37,211,102,0.18);
    }

    .erro {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 0.6rem 0.85rem;
      font-size: 0.875rem;
      margin-top: 0.75rem;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 1rem;
      padding: 0.75rem;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover   { background: #1dab52; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>WhatsApp <span>Envio</span></h1>
      <p>Digite a senha para acessar o painel</p>
    </div>

    <form id="form-login" novalidate>
      <label for="inp-senha">Senha</label>
      <input
        type="password"
        id="inp-senha"
        placeholder="••••••••"
        required
        autofocus
        autocomplete="current-password"
      >
      <div id="erro" class="erro" hidden></div>
      <button type="submit" id="btn-entrar">Entrar</button>
    </form>
  </div>

  <script>
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const senha  = document.getElementById('inp-senha').value;
      const erroEl = document.getElementById('erro');
      const btn    = document.getElementById('btn-entrar');

      erroEl.hidden   = true;
      btn.disabled    = true;
      btn.textContent = 'Entrando…';

      try {
        const r = await fetch('/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ senha }),
        });

        if (r.ok) {
          location.href = '/';
          return;
        }

        const data = await r.json().catch(() => ({}));
        erroEl.textContent = data.error || 'Senha incorreta.';
        erroEl.hidden      = false;
        document.getElementById('inp-senha').value = '';
        document.getElementById('inp-senha').focus();
      } catch {
        erroEl.textContent = 'Erro de rede. Verifique se o servidor está rodando.';
        erroEl.hidden      = false;
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
